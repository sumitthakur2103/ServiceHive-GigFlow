services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gigflow
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
